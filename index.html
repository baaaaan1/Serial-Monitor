<!DOCTYPE html>
<html lang="en" data-theme="green">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serial Monitor</title>

  <!-- OG / Social preview -->
  <meta property="og:title" content="⚡ Serial Monitor" />
  <meta property="og:description" content="Web-based Serial Monitor using Web Serial API — runs entirely in the browser." />
  <meta property="og:image" content="https://serial.sterlings.live/og.png" />
  <meta property="og:url" content="https://serial.sterlings.live" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="⚡ Serial Monitor" />
  <meta name="twitter:description" content="Web-based Serial Monitor using Web Serial API" />
  <meta name="twitter:image" content="https://serial.sterlings.live/og.png" />

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header id="header">
      <div class="header-left">
        <span class="app-title">⚡ Serial Monitor</span>
        <div class="theme-picker">
          <span class="theme-dot" data-theme="green" title="Green"></span>
          <span class="theme-dot" data-theme="cyan" title="Cyan"></span>
          <span class="theme-dot" data-theme="amber" title="Amber"></span>
          <span class="theme-dot" data-theme="pink" title="Pink"></span>
          <span class="theme-dot" data-theme="white" title="White"></span>
        </div>
      </div>

      <div class="header-center">
        <!-- Port selector -->
        <div class="port-group">
          <div class="select-wrapper">
            <select id="portSelect">
              <option value="">-- Select Port --</option>
            </select>
          </div>
          <div class="select-wrapper">
            <select id="baudSelect">
              <option value="9600">9600</option>
              <option value="19200">19200</option>
              <option value="38400">38400</option>
              <option value="57600">57600</option>
              <option value="115200" selected>115200</option>
              <option value="230400">230400</option>
              <option value="460800">460800</option>
              <option value="921600">921600</option>
            </select>
          </div>
          <button id="reloadBtn" class="btn btn-icon" title="Refresh Ports">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.36-3.36L23 10M1 14l5.13 5.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
          <button id="connectBtn" class="btn btn-connect" title="Connect">
            <span id="connectLabel">Connect</span>
          </button>
        </div>
      </div>

      <div class="header-right">
        <button id="pauseBtn" class="btn btn-icon active" title="Pause scroll">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span>Pause</span>
        </button>
        <button id="clearBtn" class="btn btn-icon" title="Clear terminal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          <span>Clear</span>
        </button>
        <button id="copyBtn" class="btn btn-icon" title="Copy all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Copy</span>
        </button>
        <button id="saveBtn" class="btn btn-icon" title="Save log">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Save</span>
        </button>
        <button id="infoBtn" class="btn btn-icon" title="About">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>Info</span>
        </button>
      </div>
    </header>

    <!-- STATUS BAR -->
    <div id="statusBar">
      <span id="statusDot" class="status-dot disconnected"></span>
      <span id="statusText">Disconnected</span>
      <span id="lineCount" class="line-count">0 lines</span>
      <span id="dtrIndicator" class="badge">DTR: OFF</span>
      <span id="byteCount" class="byte-count">0 bytes</span>
    </div>

    <!-- TERMINAL BODY -->
    <main id="terminal">
      <div id="terminalInner">
        <div id="terminalContent"></div>
      </div>
    </main>

    <!-- SEND BAR -->
    <div id="sendBar">
      <input type="text" id="sendInput" placeholder="Send data..." autocomplete="off" />
      <div class="select-wrapper small">
        <select id="lineEndingSelect">
          <option value="\n">LF</option>
          <option value="\r\n" selected>CR+LF</option>
          <option value="\r">CR</option>
          <option value="">None</option>
        </select>
      </div>
      <button id="sendBtn" class="btn btn-connect">Send</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- INFO MODAL -->
  <div id="infoOverlay" class="modal-overlay hidden">
    <div class="modal">
      <button class="modal-close" id="infoClose" title="Close">✕</button>
      <div class="modal-header">
        <span class="modal-icon">⚡</span>
        <div>
          <h2>Serial Monitor</h2>
          <p class="modal-sub">Web-based Serial Monitor via Web Serial API</p>
        </div>
      </div>
      <div class="modal-body">
        <div class="info-row">
          <span class="info-label">Version</span>
          <span class="info-value">1.0.0</span>
        </div>
        <div class="info-row">
          <span class="info-label">Browser</span>
          <span class="info-value">Chrome / Edge 89+</span>
        </div>
        <div class="info-row">
          <span class="info-label">Protocol</span>
          <span class="info-value">Web Serial API</span>
        </div>
        <div class="info-divider"></div>
        <div class="info-row">
          <span class="info-label">Developer</span>
          <span class="info-value">baaaaan1</span>
        </div>
        <a
          href="https://github.com/baaaaan1"
          target="_blank"
          rel="noopener noreferrer"
          class="github-link"
        >
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
          github.com/baaaaan1
        </a>
        <a
          href="https://github.com/baaaaan1/serial-monitor"
          target="_blank"
          rel="noopener noreferrer"
          class="github-link repo"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z" stroke="none"/><path d="M9 3v18M3 9h6M3 15h6"/><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M13 8l4 4-4 4"/></svg>
          serial-monitor — Source Code
        </a>
      </div>
      <div class="modal-footer">
        MIT License © 2024
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
